<!DOCTYPE html>

<meta charset="UTF-8">
<title>Sangeetha Praneshawari</title>

<style>
body{
    margin: 0;
    height: 100vh;
    overflow: hidden;
    background: radial-gradient(circle at top, #ff9a9e, #fad0c4);
    font-family: 'Segoe UI', sans-serif;
    color: white;
    text-align: center;
}

/* CENTER CONTENT */
.container{
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* TITLE */
h1{
    font-size: 50px;
    animation: glow 2s ease-in-out infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #fff; }
    to { text-shadow: 0 0 25px #ff4d6d, 0 0 40px #ff4d6d; }
}

/* MESSAGE */
#message{
    font-size: 22px;
    margin-top: 20px;
    max-width: 600px;
    margin-inline: auto;
    animation: fadeIn 4s ease-in-out;
    line-height: 1.6;
}

/* BUTTON */
button{
    margin-top: 30px;
    padding: 12px 25px;
    border: none;
    border-radius: 30px;
    background: #fff;
    color:#ff4d6d;
    font-size: 18px;
    cursor: pointer;
    box-shadow: 0 0 15px rgba(255,255,255,0.6);
    transition: 0.3s;
}

button:hover{
    transform: scale(1.1);
}

/* HEARTS */
.hearts {
    position: fixed;
    top: -10px;
    animation: fall linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(100vh);
        opacity: 0;
    }
}

/* FIREWORK PARTICLES */
.firework {
    position: fixed;
    pointer-events: none;
}

.particle {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    animation: explode 1s ease-out forwards;
}

@keyframes explode {
    from {
        transform: translate(0, 0);
        opacity: 1;
    }
    to {
        transform: translate(var(--x), var(--y));
        opacity: 0;
    }
}

@keyframes fadeIn {
    from {opacity:0}
    to {opacity:1}
}
</style>
</head>
