<!DOCTYPE html>
<html>
<head>Stara ma Birthday
    <title>Birthday Wishes</title>
<style>
body{
    margin: 0;
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(to right, #bb58b8, #fad0c4);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: white;
    text-align: center;
}

h1{
    margin-top: 20%;
    font-size: 40px;
    animation: fadeIn  2s ease-in-out;
   
}

#message{
    font-size: 20px;
    margin-top: 20px;
     width: 80%;
    margin-left: auto;
    margin-right: auto;
    border-right: 2px solid white;
    white-space: nowrap;
    overflow: hidden;
    animation: typing 6s steps(60) forwards, blink 0.7s infinite;
}

@keyframes typing{
    from {width:0}
    to{width:80%}
}

@keyframes blink{
    50% {border-color: transparent;}
}

@keyframes fadeIn {
    from {opacity : 0}
    to {opacity: 1}
}

.hearts {
    position: fixed;
    top: -10px;
    animation: fall linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(100vh);
        opacity: 0;
    }
}

button{
    margin-top: 30px;
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    background: white;
    color:#ff4d6d;
    font-size: 16px;
    cursor: pointer;
}



.particle {
    position: fixed;
    top: -10px;
    animation: fall linear forwards;
}

</style>
</head>
<body>
<h1 id="title"></h1>
<div id="message">
    You are the heart that brings light into every living being and i want to cherish this light forever.
    Nothing can explain the beauty of your
    existence... Happy Birthday Stara Ma.
    I'm so greatful for the universe for bringing you here.
</div>
<button onclick="playMusic()">Tap on me</button>
<audio id="bg-music" src="flute.mp3"></audio>

<script>
    document.getElementById("title").innerText = "Happy Birthday Stara Ma";
    function createHearts(){
        const heart = document.createElement("div");
        heart.className = "hearts";
        heart.innerText = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (Math.random() * 20 +10) + "px";
        heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 6000);
    }
    function playMusic(){
        document.getElementById("bg-music").play();
    }

function createFirework() {
   const heart = document.createElement("div");
        heart.className = "particle";
        heart.innerText = "🎆";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (Math.random() * 20 +10) + "px";
        heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 6000);
}
    setInterval(createHearts, 500);
    setInterval(createFirework, 800);


</script>
</body>
</html>
