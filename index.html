<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Stara Ma Birthday</title>

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    font-family: 'Segoe UI', sans-serif;
    color:white;
    text-align:center;

    /* 🔥 animated background */
    background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #ff4d6d);
    background-size: 400% 400%;
    animation: gradientMove 10s ease infinite;
}

@keyframes gradientMove {
    0% {background-position:0% 50%;}
    50% {background-position:100% 50%;}
    100% {background-position:0% 50%;}
}

.container{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
}

/* ⚡ neon title */
h1{
    font-size:55px;
    text-shadow: 0 0 10px #fff, 0 0 30px #ff4d6d, 0 0 60px #ff4d6d;
    animation: pulse 2s infinite;
}

@keyframes pulse{
    0% {transform: scale(1);}
    50% {transform: scale(1.05);}
    100% {transform: scale(1);}
}

#message{
    font-size:22px;
    margin-top:20px;
    max-width:600px;
    line-height:1.6;
}

/* 🎵 button */
button{
    margin-top:30px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:#ff4d6d;
    color:white;
    font-size:18px;
    cursor:pointer;
    box-shadow:0 0 20px #ff4d6d;
}

/* 💖 hearts */
.hearts {
    position: fixed;
    top: -10px;
    animation: floatDown linear forwards;
    filter: drop-shadow(0 0 10px red);
}

@keyframes floatDown {
    to {
        transform: translateY(110vh) translateX(50px);
        opacity: 0;
    }
}

/* 🎆 fireworks */
.firework {
    position: fixed;
}

.particle {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    animation: explode 1s ease-out forwards;
}

@keyframes explode {
    from {
        transform: translate(0, 0);
        opacity: 1;
    }
    to {
        transform: translate(var(--x), var(--y));
        opacity: 0;
    }
}

/* ✨ sparkles */
.spark {
    position: fixed;
    width: 4px;
    height: 4px;
    background: white;
    border-radius: 50%;
    animation: twinkle 2s infinite;
}

@keyframes twinkle {
    0%,100%{opacity:0;}
    50%{opacity:1;}
}
</style>
</head>

<body>

<div class="container">
    <h1> ❤️ ಎಂದಿಗೂ ನೀನು ಇರು ಹಾಯಾಗಿ, ಅದಕ್ಕೆ ನಾನು ಇರುವೆ ಜೊತೆಯಾಗಿ.... ❤️</h1>

    <div id="message">
         ❤️ ಪ್ರತೀ ವರ್ಷ ನಿನ್ನ ಹರುಷ ನನಗೆ ಸಂತೋಷ, ನಿನ್ನ ಜನನ ಆಗಿದೆ ಮಾದರಿ ಈ ಭೂಮಿಗೆ ❤️  
        😊 ನಗುತ್ತಾ ಇರು ನಗುತ್ತಾ ಇರು ಓ ನಲ್ಲೆ... ಚಂದಿರನ ಬೆಳಕು ತರಲಿ ನಿನ್ನ ಮೊಗದ ಮೇಲೆ 😊 
        🎉 Happy Birthday Stara Ma 💖🤗🎂
    </div>

    <button onclick="playMusic()">🎵 Start Vibe</button>
</div>

<audio id="bg-music" src="flute.mp3"></audio>

<script>

/* 🎵 music */
function playMusic(){
    document.getElementById("bg-music").play();
}

/* 💖 hearts */
function createHearts(){
    const heart = document.createElement("div");
    heart.className = "hearts";
    heart.innerText = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 +10) + "px";
    heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}

/* 🎆 strong fireworks */
function createFirework() {
    const firework = document.createElement("div");
    firework.className = "firework";

    firework.style.left = Math.random() * window.innerWidth + "px";
    firework.style.top = Math.random() * window.innerHeight + "px";

    document.body.appendChild(firework);

    for (let i = 0; i < 30; i++) {
        const particle = document.createElement("div");
        particle.className = "particle";

        const angle = Math.random() * 2 * Math.PI;
        const distance = Math.random() * 100 + 50;

        particle.style.setProperty("--x", Math.cos(angle) * distance + "px");
        particle.style.setProperty("--y", Math.sin(angle) * distance + "px");

        particle.style.background = `hsl(${Math.random()*360},100%,60%)`;

        firework.appendChild(particle);
    }

    setTimeout(() => firework.remove(), 1000);
}

/* 🌟 sparkles */
function createSpark(){
    const s = document.createElement("div");
    s.className = "spark";
    s.style.left = Math.random() * 100 + "vw";
    s.style.top = Math.random() * 100 + "vh";
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),2000);
}

/* LOOP */
setInterval(createHearts, 300);
setInterval(createFirework, 700);
setInterval(createSpark, 200);

</script>

</body>
</html>
