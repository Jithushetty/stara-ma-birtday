<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #0b032d, #000000);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
  color: white;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 50px;
  padding: 60px;
  width: 90%;
  max-width: 1000px;
}

.card {
  perspective: 1000px;
  cursor: pointer;
  transition: transform 0.4s ease, box-shadow 0.4s ease;
}

.card:hover {
  transform: translateY(-15px) scale(1.07);
  box-shadow: 0 30px 60px rgba(255, 0, 128, 0.4);
}

.card-inner {
  position: relative;
  width: 100%;
  height: 300px;
  transition: transform 0.9s;
  transform-style: preserve-3d;
}

.card.flip .card-inner {
  transform: rotateY(180deg);
}

.card-front, .card-back {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 20px;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
}

.card-front {
  background: linear-gradient(135deg, #ff0080, #7928ca);
  font-size: 22px;
  font-weight: bold;
  animation: glow 2s infinite alternate;
}

.card-back {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.2);
  transform: rotateY(180deg);
  font-size: 20px;
  font-weight: bold;
  line-height: 1.6;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  0% { text-shadow: 0 0 10px #ff4d6d, 0 0 20px #ff0080; }
  100% { text-shadow: 0 0 30px #ff99c8, 0 0 50px #ff4d6d; }
}

/* stars */
.star {
  position: fixed;
  width: 2px;
  height: 2px;
  background: white;
  opacity: 0.8;
  animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
  from { opacity: 0.2; }
  to { opacity: 1; }
}

/* hearts */
.heart {
  position: fixed;
  top: -10px;
  font-size: 18px;
  animation: fall linear infinite;
}

@keyframes fall {
  to { transform: translateY(100vh); }
}

/* final message */
#finalMessage {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  padding: 40px;
  border-radius: 20px;
  text-align: center;
  font-size: 26px;
  box-shadow: 0 0 40px rgba(255,0,128,0.6);
  transition: 0.5s ease;
  overflow: hidden;
}

#finalText {
  border-right: 2px solid white;
  white-space: nowrap;
  overflow: hidden;
  display: inline-block;
}

#finalMessage.show {
  transform: translate(-50%, -50%) scale(1);
}
</style>
</head>

<body>

<div class="container">

<div class="card" onclick="flipCard(this)">
<div class="card-inner">
<div class="card-front">❤️ Chinnu ❤️</div>
<div class="card-back">you are the only blessing i want in my life </div>
</div>
</div>

<div class="card" onclick="flipCard(this)">
<div class="card-inner">
<div class="card-front">💖 Baby 💖</div>
<div class="card-back">you are that vibe i keep falling for</div>
</div>
</div>

<div class="card" onclick="flipCard(this)">
<div class="card-inner">
<div class="card-front">💘 Bangara 💘</div>
<div class="card-back">you are the heart universe has sent to me</div>
</div>
</div>

<div class="card" onclick="flipCard(this)">
<div class="card-inner">
<div class="card-front">💕 Jaanu/Shona 💕</div>
<div class="card-back">you are the vibrant soul which brings light into my heart</div>
</div>
</div>

</div>

<div id="finalMessage"><span id="finalText"></span></div>

<audio id="bgMusic" autoplay loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

<script>
let flippedCount = 0;

function flipCard(card) {
  if (!card.classList.contains('flip')) {
    flippedCount++;
  }
  card.classList.toggle('flip');

  if (flippedCount === 4) {
  const messageBox = document.getElementById('finalMessage');
  const textEl = document.getElementById('finalText');
  const message = "✨ Starama, you are my universe ❤️ ✨";

  messageBox.classList.add('show');

  let i = 0;
  function typeWriter() {
    if (i < message.length) {
      textEl.innerHTML += message.charAt(i);
      i++;
      setTimeout(typeWriter, 60);
    }
  }

  typeWriter();
}
}

// stars
for (let i = 0; i < 100; i++) {
  const star = document.createElement('div');
  star.className = 'star';
  star.style.top = Math.random() * 100 + 'vh';
  star.style.left = Math.random() * 100 + 'vw';
  document.body.appendChild(star);
}

// hearts
function createHeart() {
  const heart = document.createElement('div');
  heart.className = 'heart';
  heart.innerHTML = '❤️';
  heart.style.left = Math.random() * 100 + 'vw';
  heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 5000);
}
setInterval(createHeart, 300);

// music fallback
const music = document.getElementById('bgMusic');
document.body.addEventListener('click', () => {
  music.play().catch(()=>{});
});
</script>

</body>
</html>
